<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Update Rooms | Vibes</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&family=Questrial&display=swap"
    rel="stylesheet">

  <style>
    :root {
      --sunset-orange: #fb923c;
      --glass-bg: rgba(255, 255, 255, 0.1);
      --glass-border: rgba(255, 255, 255, 0.2);
    }

    body {
      background: linear-gradient(135deg,
          #38bdf8 0%,
          #7dd3fc 30%,
          #bae6fd 60%,
          #fdba74 85%,
          #fb923c 100%);
      background-attachment: fixed;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
    }

    /* Navbar */

    .navbar-glass {
      background: rgba(15, 23, 42, 0.25);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--glass-border);
      padding: 1rem 2rem;
    }

    .navbar-brand {
      font-family: 'Questrial', sans-serif;
      font-size: 1.8rem;
      letter-spacing: 2px;
      font-weight: bold;
      color: white !important;
      text-transform: lowercase;
    }

    .navbar-brand span {
      color: var(--sunset-orange);
    }

    /* Center layout */

    .main-content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Glass card */

    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(15px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 2.5rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      color: white;
      width: 100%;
    }

    /* Inputs */

    .form-control,
    .form-select {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid var(--glass-border);
      color: white !important;
      border-radius: 12px;
      padding: 12px 15px;
    }

    .form-control::placeholder {
      color: rgba(255, 255, 255, 0.6);
    }

    .form-control:focus,
    .form-select:focus {
      background: rgba(255, 255, 255, 0.12);
      border-color: var(--sunset-orange);
      box-shadow: 0 0 0 0.25rem rgba(251, 146, 60, 0.2);
    }

    .form-select option {
      color: black;
    }

    /* Buttons */

    .btn-update {
      background: var(--sunset-orange);
      border: none;
      color: white;
      font-weight: 700;
      padding: 14px;
      border-radius: 12px;
      transition: 0.3s;
    }

    .btn-update:hover {
      background: #f97316;
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(249, 115, 22, 0.3);
    }

    .btn-back {
      background: #64748b;
      border: none;
      color: white;
      border-radius: 12px;
      padding: 12px;
      text-decoration: none;
      display: inline-block;
      text-align: center;
    }

    .btn-back:hover {
      background: #475569;
      color: white;
    }

    .note {
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.8);
      margin-bottom: 20px;
    }
  </style>

</head>

<body>

  <nav class="navbar navbar-expand-lg navbar-glass sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">vibes<span>.</span></a>
    </div>
  </nav>

  <div class="main-content container">

    <div class="row justify-content-center w-100">

      <div class="col-lg-5 col-md-7">

        <div class="glass-card">

          <h3 class="text-center mb-3 fw-bold" th:text="'Update Rooms for Hotel: ' + ${hotelname}">
            Update Rooms
          </h3>

          <p class="note text-center">
            This will update <b>all rooms</b> under this hotel with the values you enter.
          </p>

          <form th:action="@{/hotels/{hotelname}/rooms/Editroom(hotelname=${hotelname})}" th:object="${Rrequest}"
            method="post">

            <div class="mb-3">
              <label class="form-label">Room Type</label>
              <input type="text" class="form-control" th:field="*{type}" placeholder="New type for all rooms">
            </div>

            <div class="mb-3">
              <label class="form-label">Price</label>
              <input type="number" class="form-control" th:field="*{price}" placeholder="New price for all rooms">
            </div>

            <div class="mb-3">
              <label class="form-label">Availability</label>
              <select class="form-select" th:field="*{availability}">
                <option th:value="true">Available</option>
                <option th:value="false">Not Available</option>
              </select>
            </div>

            <button type="submit" class="btn btn-update w-100 mb-3">
              Update Rooms
            </button>

            <a class="btn-back w-100" th:href="@{/hotels/{hotelname}/rooms/roomlist(hotelname=${hotelname})}">
              Back
            </a>

          </form>

        </div>

      </div>

    </div>

  </div>

</body>

</html>
