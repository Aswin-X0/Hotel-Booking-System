<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Hotel Registration | Vibes</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&family=Questrial&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --sunset-orange: #fb923c;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        body {
            background: linear-gradient(135deg,
                    #38bdf8 0%,
                    #7dd3fc 30%,
                    #bae6fd 60%,
                    #fdba74 85%,
                    #fb923c 100%);
            background-attachment: fixed;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
        }

        /* Navbar */

        .navbar-glass {
            background: rgba(15, 23, 42, 0.25);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            padding: 1rem 2rem;
        }

        .navbar-brand {
            font-family: 'Questrial', sans-serif;
            font-size: 1.8rem;
            letter-spacing: 2px;
            font-weight: bold;
            color: white !important;
            text-transform: lowercase;
        }

        .navbar-brand span {
            color: var(--sunset-orange);
        }


        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 0;
        }


        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            color: white;
        }

        .form-control,
        .form-select,
        textarea {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: black !important;
            border-radius: 12px;
            padding: 12px 15px;
        }

        .form-control::placeholder,
        textarea::placeholder {
            color: black !important;
            opacity: 1;
        }

        .form-control:focus,
        .form-select:focus {
            background: rgba(255, 255, 255, 0.12);
            border-color: var(--sunset-orange);
            box-shadow: 0 0 0 0.25rem rgba(251, 146, 60, 0.2);
        }


        .btn-register {
            background: var(--sunset-orange);
            border: none;
            color: white;
            font-weight: 700;
            padding: 14px;
            border-radius: 12px;
            transition: 0.3s;
        }

        .btn-register:hover {
            background: #f97316;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(249, 115, 22, 0.3);
        }

        .link-view {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
        }

        .link-view:hover {
            color: var(--sunset-orange);
        }
    </style>

</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-glass sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">vibes<span>.</span></a>
        </div>
    </nav>

    <div class="main-content container">

        <div class="row justify-content-center w-100">

            <div class="col-lg-8 col-md-10">

                <div class="glass-card">

                    <h3 class="text-center mb-2 fw-bold">🏨 Hotel Registration</h3>
                    <p class="text-center mb-4">Enter your hotel details</p>

                    <form th:action="@{/hotels/Registerhotel}" th:object="${hrequest}" method="post">

                        <div class="row g-3">

                            <div class="col-md-6">
                                <input type="text" class="form-control" th:field="*{hotelname}" placeholder="Hotel Name"
                                    required>
                            </div>

                            <div class="col-md-6">
                                <input type="text" class="form-control" th:field="*{number}"
                                    placeholder="Contact Number" required>
                            </div>

                            <div class="col-md-6">
                                <input type="email" class="form-control" th:field="*{email}" placeholder="Email Address"
                                    required>
                            </div>

                            <div class="col-md-6">
                                <input type="text" class="form-control" th:field="*{location}" placeholder="Location"
                                    required>
                            </div>

                            <div class="col-md-6">
                                <input type="text" class="form-control" th:field="*{price}"
                                    placeholder="Price per night" required>
                            </div>

                            <div class="col-md-6">
                                <select class="form-select" th:field="*{rating}">
                                    <option value="">Choose rating</option>
                                    <option value="1 Star">1 Star</option>
                                    <option value="2 Star">2 Star</option>
                                    <option value="3 Star">3 Star</option>
                                    <option value="4 Star">4 Star</option>
                                    <option value="5 Star">5 Star</option>
                                </select>
                            </div>

                            <div class="col-12">
                                <input type="text" class="form-control" th:field="*{ammenities}"
                                    placeholder="Amenities (WiFi, Pool, Parking...)">
                            </div>

                            <div class="col-12">
                                <textarea class="form-control" th:field="*{description}" rows="4"
                                    placeholder="Hotel description..."></textarea>
                            </div>

                        </div>

                        <button type="submit" class="btn btn-register w-100 mt-4">
                            Register Hotel
                        </button>

                    </form>

                    <div class="text-center mt-4">
                        <a th:href="@{/hotels/hotellist}" class="link-view">
                            View Hotels →
                        </a>
                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
