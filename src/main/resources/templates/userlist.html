<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>User List | Vibes</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&family=Questrial&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --ocean-blue: #1e3a8a;
            --sunset-orange: #fb923c;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        body {
            background: linear-gradient(
                    135deg,
                    #38bdf8 20%,
                    #7dd3fc 50%,
                    #bae6fd 60%,
                    #fdba74 95%,
                    #fb923c 100%);
            background-attachment: fixed;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
        }

        /* Navbar */

        .navbar-glass {
            background: rgba(15, 23, 42, 0.3);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
        }

        .navbar-brand {
            font-family: 'Questrial', sans-serif;
            font-size: 1.8rem;
            letter-spacing: 2px;
            font-weight: bold;
            color: white !important;
        }

        .navbar-brand span {
            color: var(--sunset-orange);
        }

        /* Glass container */

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            color: white;
        }

        /* Table */

        table {
            color: white;
        }

        thead {
            background: rgba(255, 255, 255, 0.1);
        }

        /* Buttons */

        .btn-edit {
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 6px 12px;
        }

        .btn-delete {
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 6px 12px;
        }

        .btn-edit:hover {
            background: #2563eb;
        }

        .btn-delete:hover {
            background: #dc2626;
        }

        .btn-home {
            background: var(--sunset-orange);
            border: none;
            color: white;
            padding: 10px 18px;
            border-radius: 10px;
        }
    </style>

</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-glass sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">vibes<span>.</span></a>
        </div>
    </nav>

    <div class="container mt-5">

        <div class="glass-card">

            <h3 class="text-center mb-4 fw-bold">All Users</h3>

            <div class="table-responsive">

                <table class="table table-bordered table-hover text-center align-middle">

                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Age</th>
                            <th>Email</th>
                            <th>Username</th>
                            <th>Role</th>
                            <th>Actions</th>
                        </tr>
                    </thead>

                    <tbody>

                        <tr th:each="user : ${users}">

                            <td th:text="${user.id}"></td>
                            <td th:text="${user.name}"></td>
                            <td th:text="${user.age}"></td>
                            <td th:text="${user.email}"></td>
                            <td th:text="${user.username}"></td>
                            <td th:text="${user.role}"></td>

                            <td>

                                <a class="btn-edit" th:href="@{'/vibes/useredit/' + ${user.username}}">
                                    Edit
                                </a>

                                <a class="btn-delete" th:href="@{'/vibes/deleteuser/' + ${user.id}}"
                                    onclick="return confirm('Are you sure you want to delete this user?');">
                                    Delete
                                </a>

                            </td>

                        </tr>

                    </tbody>

                </table>

            </div>

            <div class="text-center mt-4">

                <a th:href="@{/vibes/home}" class="btn-home">
                    Back to Home
                </a>

            </div>

        </div>

    </div>

</body>

</html>
