<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>All Hotels | Vibes</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&family=Questrial&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --sunset-orange: #fb923c;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        body {
            background: linear-gradient(135deg,
                    #38bdf8 0%,
                    #7dd3fc 30%,
                    #bae6fd 60%,
                    #fdba74 85%,
                    #fb923c 100%);
            background-attachment: fixed;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
        }

        /* Navbar */

        .navbar-glass {
            background: rgba(15, 23, 42, 0.25);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            padding: 1rem 2rem;
        }

        .navbar-brand {
            font-family: 'Questrial', sans-serif;
            font-size: 1.8rem;
            letter-spacing: 2px;
            font-weight: bold;
            color: white !important;
            text-transform: lowercase;
        }

        .navbar-brand span {
            color: var(--sunset-orange);
        }

        /* Glass container */

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            color: white;
        }

        /* Table */

        .table {
            color: white;
        }

        thead {
            background: rgba(255, 255, 255, 0.1);
        }

        /* Buttons */

        .btn-add {
            background: var(--sunset-orange);
            border: none;
            color: white;
        }

        .btn-add:hover {
            background: #f97316;
        }
    </style>

</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-glass sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">vibes<span>.</span></a>
        </div>
    </nav>


    <div class="container py-5">

        <div class="glass-card">

            <div class="d-flex justify-content-between align-items-center mb-4">

                <h3 class="fw-bold">🏨 Hotel List</h3>

                <a th:href="@{/hotels/Registerhotel}" class="btn btn-add">
                    + Add New Hotel
                </a>

            </div>


            <!-- No hotels -->

            <div th:if="${#lists.isEmpty(hotels)}" class="alert alert-warning text-center">
                No hotels available.
            </div>


            <!-- Hotel Table -->

            <div th:if="${!#lists.isEmpty(hotels)}">

                <div class="table-responsive">

                    <table class="table table-bordered table-hover align-middle text-center">

                        <thead>

                            <tr>
                                <th>Name</th>
                                <th>Contact</th>
                                <th>Email</th>
                                <th>Location</th>
                                <th>Price</th>
                                <th>Rating</th>
                                <th>Amenities</th>
                                <th>Description</th>
                                <th>Rooms</th>
                                <th>Actions</th>
                            </tr>

                        </thead>

                        <tbody>

                            <tr th:each="hotel : ${hotels}">

                                <td th:text="${hotel.hotelname}"></td>
                                <td th:text="${hotel.number}"></td>
                                <td th:text="${hotel.email}"></td>
                                <td th:text="${hotel.location}"></td>
                                <td th:text="${hotel.price}"></td>
                                <td th:text="${hotel.rating}"></td>
                                <td th:text="${hotel.ammenities}"></td>
                                <td th:text="${hotel.description}"></td>

                                <td>

                                    <a th:href="@{/hotels/{hotelname}/rooms/roomlist(hotelname=${hotel.hotelname})}"
                                        class="btn btn-sm btn-success mb-1">
                                        View Rooms
                                    </a>

                                    <br>

                                    <a th:href="@{/hotels/{hotelname}/rooms/Newroom(hotelname=${hotel.hotelname})}"
                                        class="btn btn-sm btn-warning">
                                        Add Rooms
                                    </a>

                                </td>

                                <td>

                                    <a th:href="@{/hotels/Updatehotel/{hotelname}(hotelname=${hotel.hotelname})}"
                                        class="btn btn-sm btn-primary mb-1">
                                        Edit
                                    </a>

                                    <br>

                                    <a th:href="@{/hotels/Deletehotel/{hotelname}(hotelname=${hotel.hotelname})}"
                                        class="btn btn-sm btn-danger" onclick="return confirm('Are you sure?')">
                                        Delete
                                    </a>

                                </td>

                            </tr>

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
