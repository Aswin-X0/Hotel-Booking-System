<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Room List | Vibes</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&family=Questrial&display=swap"
    rel="stylesheet">

  <style>
    :root {
      --sunset-orange: #fb923c;
      --glass-bg: rgba(255, 255, 255, 0.1);
      --glass-border: rgba(255, 255, 255, 0.2);
    }

    body {
      background: linear-gradient(135deg,
          #38bdf8 0%,
          #7dd3fc 30%,
          #bae6fd 60%,
          #fdba74 85%,
          #fb923c 100%);
      background-attachment: fixed;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
    }

    /* Navbar */

    .navbar-glass {
      background: rgba(15, 23, 42, 0.25);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--glass-border);
      padding: 1rem 2rem;
    }

    .navbar-brand {
      font-family: 'Questrial', sans-serif;
      font-size: 1.8rem;
      letter-spacing: 2px;
      font-weight: bold;
      color: white !important;
      text-transform: lowercase;
    }

    .navbar-brand span {
      color: var(--sunset-orange);
    }

    /* Glass card */

    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(15px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      color: white;
    }

    /* Table */

    .table {
      color: white;
    }

    thead {
      background: rgba(255, 255, 255, 0.1);
    }

    /* Buttons */

    .btn-add {
      background: #22c55e;
      border: none;
      color: white;
    }

    .btn-edit {
      background: #facc15;
      border: none;
      color: black;
    }

    .btn-delete {
      background: #ef4444;
      border: none;
      color: white;
    }

    .btn-add:hover {
      background: #16a34a;
    }

    .btn-edit:hover {
      background: #eab308;
    }

    .btn-delete:hover {
      background: #dc2626;
    }
  </style>

</head>

<body>

  <nav class="navbar navbar-expand-lg navbar-glass sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">vibes<span>.</span></a>
    </div>
  </nav>


  <div class="container py-5">

    <div class="glass-card">

      <h3 class="mb-4 fw-bold text-center" th:text="'Rooms for Hotel: ' + ${hotelname}">
        Rooms
      </h3>


      <div class="d-flex justify-content-center gap-3 mb-4">

        <a class="btn btn-add" th:href="@{/hotels/{hotelname}/rooms/Newroom(hotelname=${hotelname})}">
          + Add New Room
        </a>

        <a class="btn btn-edit" th:href="@{/hotels/{hotelname}/rooms/Editroom(hotelname=${hotelname})}">
          Edit Rooms
        </a>

      </div>


      <div class="table-responsive">

        <table class="table table-bordered table-hover text-center align-middle">

          <thead>
            <tr>
              <th>ID</th>
              <th>Type</th>
              <th>Price</th>
              <th>Availability</th>
              <th>Action</th>
            </tr>
          </thead>

          <tbody>

            <tr th:if="${#lists.isEmpty(rooms)}">
              <td colspan="5" class="text-danger fw-bold">
                No rooms available for this hotel.
              </td>
            </tr>

            <tr th:each="room : ${rooms}">

              <td th:text="${room.id}"></td>
              <td th:text="${room.type}"></td>
              <td th:text="${room.price}"></td>
              <td th:text="${room.availability}"></td>

              <td>

                <a class="btn btn-delete btn-sm" th:href="@{/hotels/{hotelname}/rooms/delete/{roomId}(
hotelname=${hotelname},
roomId=${room.id})}" onclick="return confirm('Delete this room?');">
                  Delete
                </a>

              </td>

            </tr>

          </tbody>

        </table>

      </div>

    </div>

  </div>

</body>

</html>
