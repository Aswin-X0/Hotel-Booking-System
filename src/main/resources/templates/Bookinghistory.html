<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking History | Vibes</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&family=Questrial&display=swap" rel="stylesheet">

  <style>
    :root{
      --sunset-orange:#fb923c;
      --glass-bg:rgba(255,255,255,0.1);
      --glass-border:rgba(255,255,255,0.2);
    }

    body{
      background: linear-gradient(
        135deg,
        #38bdf8 0%,
        #7dd3fc 30%,
        #bae6fd 60%,
        #fdba74 85%,
        #fb923c 100%
      );
      background-attachment: fixed;
      min-height:100vh;
      font-family:'Inter',sans-serif;
      display:flex;
      flex-direction:column;
    }

    .navbar-glass{
      background:rgba(15,23,42,0.25);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      border-bottom:1px solid var(--glass-border);
      padding:1rem 2rem;
    }

    .navbar-brand{
      font-family:'Questrial',sans-serif;
      font-size:1.8rem;
      letter-spacing:2px;
      font-weight:bold;
      color:white !important;
      text-transform:lowercase;
    }

    .navbar-brand span{
      color:var(--sunset-orange);
    }

    .main-content{
      flex:1;
      padding:40px 0;
    }

    .glass-card{
      background:var(--glass-bg);
      backdrop-filter:blur(15px);
      -webkit-backdrop-filter:blur(15px);
      border:1px solid var(--glass-border);
      border-radius:24px;
      padding:2rem;
      box-shadow:0 20px 40px rgba(0,0,0,0.3);
      color:white;
    }

    .page-subtitle{
      color:rgba(255,255,255,0.85);
      margin-bottom:1.5rem;
    }

    .table{
      color:white;
      margin-bottom:0;
    }

    .table thead th{
      background:rgba(255,255,255,0.12);
      border-color:rgba(255,255,255,0.15);
      color:white;
      text-align:center;
      vertical-align:middle;
    }

    .table tbody td{
      background:rgba(255,255,255,0.04);
      border-color:rgba(255,255,255,0.12);
      color:white;
      text-align:center;
      vertical-align:middle;
    }

    .alert{
      border:none;
      border-radius:12px;
    }

    .alert-success{
      background:rgba(34,197,94,0.18);
      color:white;
    }

    .alert-danger{
      background:rgba(239,68,68,0.18);
      color:white;
    }

    .alert-info{
      background:rgba(255,255,255,0.15);
      color:white;
    }

    .btn-cancel{
      background:#ef4444;
      border:none;
      color:white;
      border-radius:10px;
      padding:8px 14px;
      font-weight:600;
      transition:0.3s;
    }

    .btn-cancel:hover{
      background:#dc2626;
      color:white;
      transform:translateY(-1px);
    }

    .status-badge{
      padding:6px 12px;
      border-radius:999px;
      font-size:0.85rem;
      font-weight:600;
      display:inline-block;
    }

    .status-confirmed{
      background:rgba(34,197,94,0.2);
      color:#dcfce7;
      border:1px solid rgba(34,197,94,0.35);
    }

    .status-cancelled{
      background:rgba(239,68,68,0.2);
      color:#fee2e2;
      border:1px solid rgba(239,68,68,0.35);
    }

    .status-other{
      background:rgba(255,255,255,0.16);
      color:white;
      border:1px solid rgba(255,255,255,0.2);
    }

    .empty-box{
      background:rgba(255,255,255,0.08);
      border:1px solid var(--glass-border);
      border-radius:16px;
      padding:1rem;
      text-align:center;
      color:white;
    }
  </style>
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-glass sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">vibes<span>.</span></a>
    </div>
  </nav>

  <div class="main-content container">
    <div class="row justify-content-center">
      <div class="col-lg-10">

        <div class="glass-card">
          <h3 class="fw-bold mb-1">📜 Booking History</h3>
          <p class="page-subtitle">Username: <span th:text="${username}"></span></p>

          <div th:if="${msg}" class="alert alert-success" th:text="${msg}"></div>
          <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

          <div th:if="${bookings == null || bookings.isEmpty()}" class="empty-box">
            No bookings found.
          </div>

          <div class="table-responsive" th:if="${bookings != null && !bookings.isEmpty()}">
            <table class="table table-bordered table-hover align-middle">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Hotel</th>
                  <th>Room</th>
                  <th>Check-in</th>
                  <th>Check-out</th>
                  <th>Status</th>
                  <th>Action</th>
                </tr>
              </thead>

              <tbody>
                <tr th:each="b : ${bookings}">
                  <td th:text="${b.id}"></td>
                  <td th:text="${b.rooms.hotel.hotelname}"></td>
                  <td th:text="${b.rooms.id}"></td>
                  <td th:text="${b.checkIn}"></td>
                  <td th:text="${b.checkOut}"></td>

                  <td>
                    <span th:if="${b.status.name() == 'CONFIRMED'}"
                          class="status-badge status-confirmed"
                          th:text="${b.status}"></span>

                    <span th:if="${b.status.name() == 'CANCELLED'}"
                          class="status-badge status-cancelled"
                          th:text="${b.status}"></span>

                    <span th:if="${b.status.name() != 'CONFIRMED' && b.status.name() != 'CANCELLED'}"
                          class="status-badge status-other"
                          th:text="${b.status}"></span>
                  </td>

                  <td>
                    <form th:if="${b.status.name() == 'CONFIRMED'}"
                          th:action="@{/hotels/bookings/{id}/cancel(id=${b.id})}"
                          method="post"
                          class="m-0">
                      <input type="hidden" name="username" th:value="${username}">
                      <button class="btn btn-cancel btn-sm" type="submit">Cancel</button>
                    </form>

                    <span th:if="${b.status.name() != 'CONFIRMED'}">—</span>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>

        </div>

      </div>
    </div>
  </div>

</body>
</html>
