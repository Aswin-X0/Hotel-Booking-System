<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment | Vibes</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&family=Questrial&display=swap"
    rel="stylesheet">

  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

  <style>
    :root {
      --sunset-orange: #fb923c;
      --glass-bg: rgba(255, 255, 255, 0.1);
      --glass-border: rgba(255, 255, 255, 0.2);
    }

    body {
      background: linear-gradient(135deg,
          #38bdf8 0%,
          #7dd3fc 30%,
          #bae6fd 60%,
          #fdba74 85%,
          #fb923c 100%);
      background-attachment: fixed;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
    }


    .navbar-glass {
      background: rgba(15, 23, 42, 0.25);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--glass-border);
      padding: 1rem 2rem;
    }

    .navbar-brand {
      font-family: 'Questrial', sans-serif;
      font-size: 1.8rem;
      letter-spacing: 2px;
      font-weight: bold;
      color: white !important;
      text-transform: lowercase;
    }

    .navbar-brand span {
      color: var(--sunset-orange);
    }

    /* Center layout */

    .main-content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Glass card */

    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(15px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 2rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      color: white;
      text-align: center;
    }

    /* Booking info */

    .booking-info {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 1rem;
      margin-bottom: 1.5rem;
    }

    /* Pay button */

    .btn-pay {
      background: var(--sunset-orange);
      border: none;
      color: white;
      font-weight: 700;
      padding: 14px;
      border-radius: 12px;
      width: 100%;
      transition: 0.3s;
    }

    .btn-pay:hover {
      background: #f97316;
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(249, 115, 22, 0.3);
    }
  </style>

</head>

<body>

  <nav class="navbar navbar-expand-lg navbar-glass sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">vibes<span>.</span></a>
    </div>
  </nav>

  <div class="main-content container">

    <div class="row justify-content-center w-100">

      <div class="col-lg-5 col-md-7">

        <div class="glass-card">

          <h3 class="mb-4 fw-bold">
            Pay for Booking #<span th:text="${booking.id}"></span>
          </h3>

          <div class="booking-info">
            <p><b>Room:</b> <span th:text="${booking.rooms.type}"></span></p>
            <p><b>Hotel:</b> <span th:text="${booking.rooms.hotel.hotelname}"></span></p>
          </div>

          <button id="payBtn" class="btn-pay">Pay Now</button>

          <form id="paymentForm" method="post" th:action="@{/Bookings/payment/{bookingId}(bookingId=${booking.id})}"> 
            <input type="hidden" name="razorpay_order_id" id="orderIdField">
            <input type="hidden" name="razorpay_payment_id" id="paymentIdField">
            <input type="hidden" name="razorpay_signature" id="signatureField">
          </form>

        </div>

      </div>

    </div>

  </div>

  <script th:inline="javascript">

    const options = {
      key: /*[[${razorpayKeyId}]]*/ "",
      amount: /*[[${amountPaise}]]*/ 0,
      currency: "INR",
      name: "VIBES Hotel Booking",
      description: "Complete payment to confirm booking",
      order_id: /*[[${orderId}]]*/ "",

      handler: function (response) {
        document.getElementById("orderIdField").value = response.razorpay_order_id;
        document.getElementById("paymentIdField").value = response.razorpay_payment_id;
        document.getElementById("signatureField").value = response.razorpay_signature;
        document.getElementById("paymentForm").submit();
      }

    };

    document.getElementById("payBtn").onclick = function (e) {
      e.preventDefault();

      const rzp = new Razorpay(options);

      rzp.on('payment.failed', function () {
        document.getElementById("paymentForm").submit();
      });

      rzp.open();
    };

  </script>

</body>

</html>
