<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Payment Status | Vibes</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&family=Questrial&display=swap"
    rel="stylesheet">

  <style>
    :root {
      --sunset-orange: #fb923c;
      --glass-bg: rgba(255, 255, 255, 0.1);
      --glass-border: rgba(255, 255, 255, 0.2);
    }

    body {
      background: linear-gradient(135deg,
          #38bdf8 0%,
          #7dd3fc 30%,
          #bae6fd 60%,
          #fdba74 85%,
          #fb923c 100%);
      background-attachment: fixed;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
    }

    .navbar-glass {
      background: rgba(15, 23, 42, 0.25);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--glass-border);
      padding: 1rem 2rem;
    }

    .navbar-brand {
      font-family: 'Questrial', sans-serif;
      font-size: 1.8rem;
      letter-spacing: 2px;
      font-weight: bold;
      color: white !important;
      text-transform: lowercase;
    }

    .navbar-brand span {
      color: var(--sunset-orange);
    }

    .main-content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(15px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 2rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      color: white;
      text-align: center;
    }

    .success {
      color: #22c55e;
      font-weight: 700;
    }

    .failed {
      color: #ef4444;
      font-weight: 700;
    }
    .btn-main {
      background: var(--sunset-orange);
      border: none;
      color: white;
      font-weight: 700;
      padding: 12px;
      border-radius: 12px;
      transition: 0.3s;
    }
    .btn-main:hover {
      background: #f97316;
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(249, 115, 22, 0.3);
    }
    .btn-retry {
      background: #ef4444;
      border: none;
      color: white;
      padding: 12px;
      border-radius: 12px;
      transition: 0.3s;
    }
    .btn-retry:hover {
      background: #dc2626;
    }
  </style>

</head>

<body>
  <nav class="navbar navbar-expand-lg navbar-glass sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">vibes<span>.</span></a>
    </div>
  </nav>
  <div class="main-content container">
    <div class="row justify-content-center w-100">
      <div class="col-lg-5 col-md-7">
        <div class="glass-card">
          <h3>
            Payment
            <span th:text="${status}" th:classappend="${status=='SUCCESS'} ? 'success' : 'failed'">
            </span>
          </h3>
          <p class="mt-3">
            Booking ID: <b th:text="${bookingId}"></b>
          </p>
          <div th:if="${status == 'SUCCESS'}">
            <p>
              Payment ID: <b th:text="${paymentId}"></b>
            </p>
            <p class="success">
              Booking is confirmed ✅
            </p>
            <a class="btn btn-main w-100 mt-3" th:href="@{/hotels/bookings}">
              Go to My Bookings 
            </a>
          </div>
          <div th:if="${status == 'FAILED'}">

            <p class="failed">
              Payment failed or cancelled 
            </p>

            <a class="btn btn-retry w-100 mt-3" th:href="@{/Bookings/paymentform/{id}(id=${bookingId})}">
              Try Again
            </a>
          </div>
        </div>
      </div>
    </div>

  </div>

</body>

</html>
