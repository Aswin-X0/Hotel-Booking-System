<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Room | Vibes</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&family=Questrial&display=swap" rel="stylesheet">

  <style>
    :root{
      --sunset-orange:#fb923c;
      --glass-bg:rgba(255,255,255,0.1);
      --glass-border:rgba(255,255,255,0.2);
    }

    body{
      background: linear-gradient(
        135deg,
        #38bdf8 0%,
        #7dd3fc 30%,
        #bae6fd 60%,
        #fdba74 85%,
        #fb923c 100%
      );
      background-attachment: fixed;
      min-height:100vh;
      font-family:'Inter',sans-serif;
      display:flex;
      flex-direction:column;
    }

    .navbar-glass{
      background:rgba(15,23,42,0.25);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      border-bottom:1px solid var(--glass-border);
      padding:1rem 2rem;
    }

    .navbar-brand{
      font-family:'Questrial',sans-serif;
      font-size:1.8rem;
      letter-spacing:2px;
      font-weight:bold;
      color:white !important;
      text-transform:lowercase;
    }

    .navbar-brand span{
      color:var(--sunset-orange);
    }

    .main-content{
      flex:1;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:40px 0;
    }

    .glass-card{
      background:var(--glass-bg);
      backdrop-filter:blur(15px);
      -webkit-backdrop-filter:blur(15px);
      border:1px solid var(--glass-border);
      border-radius:24px;
      padding:2.5rem;
      box-shadow:0 20px 40px rgba(0,0,0,0.3);
      color:white;
    }

    .room-info{
      background:rgba(255,255,255,0.08);
      border:1px solid var(--glass-border);
      border-radius:16px;
      padding:1rem;
      margin-bottom:1.5rem;
    }

    .room-info p{
      margin-bottom:0.5rem;
    }

    .form-label{
      font-weight:500;
    }

    .form-control{
      background:rgba(255,255,255,0.08);
      border:1px solid var(--glass-border);
      color:white !important;
      border-radius:12px;
      padding:12px 15px;
    }

    .form-control:focus{
      background:rgba(255,255,255,0.12);
      border-color:var(--sunset-orange);
      box-shadow:0 0 0 0.25rem rgba(251,146,60,0.2);
    }

    .form-control::placeholder{
      color:rgba(255,255,255,0.6);
    }

    .btn-book{
      background:var(--sunset-orange);
      border:none;
      color:white;
      font-weight:700;
      padding:14px;
      border-radius:12px;
      transition:0.3s;
    }

    .btn-book:hover{
      background:#f97316;
      transform:translateY(-2px);
      box-shadow:0 10px 20px rgba(249,115,22,0.3);
      color:white;
    }

    .alert-danger{
      background:rgba(220,53,69,0.18);
      border:1px solid rgba(255,255,255,0.2);
      color:white;
      border-radius:12px;
    }
  </style>
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-glass sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">vibes<span>.</span></a>
    </div>
  </nav>

  <div class="main-content container">
    <div class="row justify-content-center w-100">
      <div class="col-lg-6 col-md-8">

        <div class="glass-card">
          <h3 class="text-center mb-4 fw-bold">Book Room</h3>

          <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

          <div class="room-info">
            <p><b>Room ID:</b> <span th:text="${room.id}"></span></p>
            <p><b>Type:</b> <span th:text="${room.type}"></span></p>
            <p><b>Price:</b> ₹<span th:text="${room.price}"></span></p>
            <p class="mb-0"><b>Hotel:</b> <span th:text="${room.hotel.hotelname}"></span></p>
          </div>

          <form th:action="@{/hotels/{hotelname}/book/{roomId}(hotelname=${hotelname}, roomId=${roomId})}"
                method="post"
                th:object="${brequest}">

            <div class="mb-3">
              <label class="form-label">Username</label>
              <input class="form-control" type="text" th:field="*{username}" required>
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">Check-in</label>
                <input class="form-control" type="date" th:field="*{checkIn}" th:attr="min=${today}" required>
              </div>

              <div class="col-md-6 mb-3">
                <label class="form-label">Check-out</label>
                <input class="form-control" type="date" th:field="*{checkOut}" th:attr="min=${today}" required>
              </div>
            </div>

            <button class="btn btn-book w-100" type="submit">Confirm Booking</button>
          </form>

        </div>

      </div>
    </div>
  </div>

</body>
</html>
