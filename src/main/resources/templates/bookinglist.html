<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking List | Vibes</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&family=Questrial&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --ocean-blue: #1e3a8a;
            --sunset-orange: #fb923c;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        body {
            background: linear-gradient(
                135deg,
                #38bdf8 20%,
                #7dd3fc 50%,
                #bae6fd 60%,
                #fdba74 95%,
                #fb923c 100%
            );
            background-attachment: fixed;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
        }

        .navbar-glass {
            background: rgba(15, 23, 42, 0.3);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
        }

        .navbar-brand {
            font-family: 'Questrial', sans-serif;
            font-size: 1.8rem;
            letter-spacing: 2px;
            font-weight: bold;
            color: white !important;
        }

        .navbar-brand span {
            color: var(--sunset-orange);
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            color: white;
        }

        table {
            color: white;
        }

        thead {
            background: rgba(255, 255, 255, 0.1);
        }

        .status-confirmed {
            color: #86efac;
            font-weight: 600;
        }

        .status-cancelled {
            color: #fca5a5;
            font-weight: 600;
        }

        .status-other {
            color: #fde68a;
            font-weight: 600;
        }

        .btn-home {
            background: var(--sunset-orange);
            border: none;
            color: white;
            padding: 10px 18px;
            border-radius: 10px;
            text-decoration: none;
            display: inline-block;
        }

        .btn-home:hover {
            background: #f97316;
            color: white;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-glass sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">vibes<span>.</span></a>
        </div>
    </nav>

    <div class="container mt-5">

        <div class="glass-card">

            <h3 class="text-center mb-4 fw-bold">All Bookings</h3>

            <div class="table-responsive">
                <table class="table table-bordered table-hover text-center align-middle">

                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Username</th>
                            <th>Check In</th>
                            <th>Check Out</th>
                            <th>Status</th>
                            <th>Room</th>
                        </tr>
                    </thead>

                    <tbody>

                        <tr th:if="${#lists.isEmpty(bookings)}">
                            <td colspan="6" class="text-white fw-semibold">
                                No bookings available.
                            </td>
                        </tr>

                        <tr th:each="booking : ${bookings}">
                            <td th:text="${booking.id}"></td>
                            <td th:text="${booking.user.username}"></td>
                            <td th:text="${booking.checkIn}"></td>
                            <td th:text="${booking.checkOut}"></td>

                            <td>
                                <span th:if="${booking.status.name() == 'CONFIRMED'}"
                                      class="status-confirmed"
                                      th:text="${booking.status}"></span>

                                <span th:if="${booking.status.name() == 'CANCELLED'}"
                                      class="status-cancelled"
                                      th:text="${booking.status}"></span>

                                <span th:if="${booking.status.name() != 'CONFIRMED' && booking.status.name() != 'CANCELLED'}"
                                      class="status-other"
                                      th:text="${booking.status}"></span>
                            </td>

                            <td th:text="${booking.rooms != null ? booking.rooms.id : 'No Room'}"></td>
                        </tr>

                    </tbody>

                </table>
            </div>

            <div class="text-center mt-4">
                <a th:href="@{/vibes/home}" class="btn-home">
                    Back to Home
                </a>
            </div>

        </div>

    </div>

</body>

</html>
