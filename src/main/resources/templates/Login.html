<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Vibes</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&family=Questrial&display=swap" rel="stylesheet">

<style>

:root {
    --ocean-blue: #1e3a8a;
    --sunset-orange: #fb923c;
    --glass-bg: rgba(255, 255, 255, 0.1);
    --glass-border: rgba(255, 255, 255, 0.2);
}

body {
    background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 30%, #3b82f6 60%, #fdba74 90%, #fb923c 100%);
    background-attachment: fixed;
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
    display: flex;
    flex-direction: column;
}

/* Navbar */

.navbar-glass {
    background: rgba(15, 23, 42, 0.3);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--glass-border);
    padding: 1rem 2rem;
}

.navbar-brand {
    font-family: 'Questrial', sans-serif;
    font-size: 1.8rem;
    letter-spacing: 2px;
    font-weight: bold;
    color: white !important;
    text-transform: lowercase;
}

.navbar-brand span {
    color: var(--sunset-orange);
}

/* Center login */

.main-content {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Glass Card */

.glass-card {
    background: var(--glass-bg);
    backdrop-filter: blur(15px);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    padding: 2.5rem;
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    color: white;
}

/* Inputs */

.form-control {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--glass-border);
    color: white !important;
    border-radius: 12px;
    padding: 12px 15px;
}

.form-control:focus {
    background: rgba(255,255,255,0.12);
    border-color: var(--sunset-orange);
    box-shadow: 0 0 0 0.25rem rgba(251,146,60,0.2);
}

.form-control::placeholder {
    color: rgba(255,255,255,0.5);
}

/* Button */

.btn-login {
    background: var(--sunset-orange);
    border: none;
    color: white;
    font-weight: 700;
    padding: 14px;
    border-radius: 12px;
    transition: 0.4s;
}

.btn-login:hover {
    background: #f97316;
    transform: translateY(-3px);
    box-shadow: 0 10px 20px rgba(249,115,22,0.3);
}

/* Link */

.signup-link {
    color: rgba(255,255,255,0.7);
    text-decoration: none;
    font-size: 0.9rem;
}

.signup-link:hover {
    color: var(--sunset-orange);
    text-decoration: underline;
}

</style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-glass sticky-top">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">vibes<span>.</span></a>
    </div>
</nav>

<div class="main-content container">
    <div class="row justify-content-center w-100">
        <div class="col-11 col-sm-8 col-md-6 col-lg-4">

            <div class="glass-card">

                <h3 class="text-center mb-4 fw-bold">Welcome Back</h3>

                <form th:action="@{/vibes/signin}" method="post">

                    <div class="mb-3">
                        <input type="text" name="username" 
                               class="form-control" 
                               placeholder="Username" required>
                    </div>

                    <div class="mb-3">
                        <input type="password" name="password" 
                               class="form-control" 
                               placeholder="Password" required>
                    </div>

                    <button type="submit" class="btn btn-login w-100 mb-3">
                        Login
                    </button>

                    <p th:if="${error}" class="text-warning text-center small"
                       th:text="${error}"></p>

                </form>

                <div class="text-center mt-3">
                    <a th:href="@{/vibes/signupform}" class="signup-link">
                        Don't have an account? Sign up
                    </a>
                </div>

            </div>

        </div>
    </div>
</div>

</body>
</html>
