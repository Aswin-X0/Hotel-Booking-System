<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Edit User | Vibes</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&family=Questrial&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --sunset-orange: #fb923c;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        body {
            background: linear-gradient(135deg,
                    #38bdf8 0%,
                    #7dd3fc 30%,
                    #bae6fd 60%,
                    #fdba74 85%,
                    #fb923c 100%);
            background-attachment: fixed;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
        }

        /* Navbar */

        .navbar-glass {
            background: rgba(15, 23, 42, 0.25);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            padding: 1rem 2rem;
        }

        .navbar-brand {
            font-family: 'Questrial', sans-serif;
            font-size: 1.8rem;
            letter-spacing: 2px;
            font-weight: bold;
            color: white !important;
            text-transform: lowercase;
        }

        .navbar-brand span {
            color: var(--sunset-orange);
        }

        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }


        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            color: white;
            width: 100%;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: white !important;
            border-radius: 12px;
            padding: 12px 15px;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.12);
            border-color: var(--sunset-orange);
            box-shadow: 0 0 0 0.25rem rgba(251, 146, 60, 0.2);
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        /* Button */

        .btn-update {
            background: var(--sunset-orange);
            border: none;
            color: white;
            font-weight: 700;
            padding: 14px;
            border-radius: 12px;
            transition: 0.3s;
        }

        .btn-update:hover {
            background: #f97316;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(249, 115, 22, 0.3);
        }
    </style>

</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-glass sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">vibes<span>.</span></a>
        </div>
    </nav>

    <div class="main-content container">

        <div class="row justify-content-center w-100">

            <div class="col-11 col-sm-8 col-md-6 col-lg-4">

                <div class="glass-card">

                    <h3 class="text-center mb-4 fw-bold">Edit User</h3>

                    <form th:object="${user}" th:action="@{'/vibes/useredit/' + ${user.username}}" method="post">

                        <div class="mb-3">
                            <input type="text" th:field="*{name}" class="form-control" placeholder="Name">
                        </div>

                        <div class="mb-3">
                            <input type="text" th:field="*{age}" class="form-control" placeholder="Age">
                        </div>

                        <div class="mb-3">
                            <input type="email" th:field="*{email}" class="form-control" placeholder="Email">
                        </div>

                        <div class="mb-3">
                            <input type="text" th:field="*{number}" class="form-control" placeholder="Phone Number">
                        </div>

                        <button type="submit" class="btn btn-update w-100">
                            Update User
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
